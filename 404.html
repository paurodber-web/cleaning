<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://maidathome.com.au/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "404.Html",
      "item": "https://maidathome.com.au/404.html/"
    }
  ]
}
</script>
</head>
<body>
    <script>
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;

            // Normalize path: remove trailing slash for easier comparison
            var cleanPath = path.replace(/\/$/, "");

            // 1. Detect if it's an old /suburbs/ path
            if (cleanPath.includes('/suburbs')) {
                var newPath = cleanPath.replace('/suburbs', '/locations');
                // Ensure it ends with .html for the server
                if (!newPath.endsWith('.html')) {
                    newPath += '.html';
                }
                window.location.replace(window.location.origin + newPath + search + hash);
            } 
            // 2. Handle /locations/ without .html (fixes Sitemap/Google issues)
            else if (cleanPath.includes('/locations/') && !cleanPath.endsWith('.html')) {
                window.location.replace(window.location.origin + cleanPath + '.html' + search + hash);
            }
            // 3. General Fallback to Home (only if not already home and not a valid subpage)
            else {
                setTimeout(function() {
                    if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') {
                        window.location.replace('/');
                    }
                }, 100);
            }
        })();
    </script>
</body>
</html>
