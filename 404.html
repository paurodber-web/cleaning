<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>

    <style>
        :root {
            --ink: #0d0d0d;
            --muted: #5b5b5b;
            --accent: #0d47a1;
            --accent-soft: #e8f0ff;
            --card: #ffffff;
            --shadow: 0 18px 40px rgba(13, 13, 13, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top, #f7fbff 0%, #f1f6ff 45%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .card {
            background: var(--card);
            box-shadow: var(--shadow);
            border-radius: 20px;
            max-width: 720px;
            width: 100%;
            padding: 36px 36px 32px;
            border: 1px solid rgba(13, 13, 13, 0.06);
        }

        .eyebrow {
            display: inline-block;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 6px 12px;
            border-radius: 999px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 34px;
            margin: 0 0 12px;
        }

        p {
            font-size: 17px;
            line-height: 1.7;
            margin: 0 0 16px;
            color: var(--muted);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--accent);
            border-color: rgba(13, 71, 161, 0.25);
        }

        .helper {
            font-size: 14px;
            color: var(--muted);
            margin-top: 18px;
        }
    </style>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://maidathome.com.au/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "404.Html",
      "item": "https://maidathome.com.au/404.html/"
    }
  ]
}
</script>
</head>
<body>
    <main class="card" role="main">
        <span class="eyebrow">404 Error</span>
        <h1>Page not found</h1>
        <p>The page you are looking for may have been moved, renamed, or no longer exists.</p>
        <p>We can help you get back on track with a clean start.</p>
        <div class="actions">
            <a class="btn btn-primary" href="/">Go to home</a>
            <a class="btn btn-secondary" href="/services/">View services</a>
        </div>
        <div class="helper">If you typed the address, double-check the spelling and try again.</div>
    </main>
</body>
</html>
