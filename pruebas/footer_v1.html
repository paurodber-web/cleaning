<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Design V1 - Centered Minimalism</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/fontawesome.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Design Overrides for V1 */
    .cs_footer_v1 {
      background-color: #0b0e07;
      padding: 80px 0 40px;
      color: #fff;
      border-radius: 20px;
      margin: 20px;
    }
    .cs_footer_logo_v1 {
      margin-bottom: 50px;
      text-align: center;
    }
    .cs_footer_logo_v1 img {
      max-width: 180px;
    }
    .cs_footer_nav_v1 {
      display: flex;
      justify-content: center;
      gap: 30px;
      list-style: none;
      padding: 0;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }
    .cs_footer_nav_v1 a {
      color: #cbd5e1;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
      transition: color 0.3s;
    }
    .cs_footer_nav_v1 a:hover {
      color: #facc15; /* Accent color */
    }
    .cs_footer_divider_v1 {
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 40px;
    }
    .cs_footer_locations_header_v1 {
      text-align: center;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #64748b;
      margin-bottom: 25px;
    }
    .cs_footer_locations_list_v1 {
      display: flex;
      justify-content: center;
      gap: 15px 30px;
      flex-wrap: wrap;
      list-style: none;
      padding: 0;
      margin-bottom: 60px;
    }
    .cs_footer_locations_list_v1 a {
      color: #fff;
      text-decoration: none;
      font-weight: 400;
      font-size: 15px;
    }
    .cs_footer_locations_list_v1 a:hover {
      color: #facc15;
    }
    .cs_footer_bottom_v1 {
      text-align: center;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>
<body style="background-color: #f8fafc; padding: 50px;">
  
  <div class="container p-0">
    <footer class="cs_footer_v1">
      <div class="container">
        <!-- Brand Logo -->
        <div class="cs_footer_logo_v1" data-aos="fade-up">
          <img src="../assets/img/logo-white.webp" alt="Maid at Home Logo">
        </div>

        <!-- Main Navigation -->
        <ul class="cs_footer_nav_v1" data-aos="fade-up" data-aos-delay="100">
          <li><a href="/">Home</a></li>
          <li><a href="/about-us">About</a></li>
          <li><a href="/services">Services</a></li>
          <li><a href="/pricing">Pricing</a></li>
          <li><a href="/suburbs">Locations</a></li>
          <li><a href="/blog">Blog</a></li>
          <li><a href="/faqs">FAQs</a></li>
          <li><a href="/contact-us">Contact</a></li>
          <li><a href="/booking">Booking</a></li>
        </ul>

        <!-- Line Divider -->
        <div class="cs_footer_divider_v1"></div>

        <!-- Locations Section -->
        <div>
          <h4 class="cs_footer_locations_header_v1">LOCATIONS</h4>
          <ul class="cs_footer_locations_list_v1" data-aos="fade-up" data-aos-delay="200">
            <li><a href="/suburbs" style="font-weight: 700; color: #facc15;">View all locations</a></li>
            <li><a href="/suburbs/house-cleaning-melbourne-cbd">Melbourne CBD</a></li>
            <li><a href="/suburbs/house-cleaning-richmond">Richmond</a></li>
            <li><a href="/suburbs/house-cleaning-south-yarra">South Yarra</a></li>
            <li><a href="/suburbs/house-cleaning-st-kilda">St Kilda</a></li>
            <li><a href="/suburbs/house-cleaning-brunswick">Brunswick</a></li>
            <li><a href="/suburbs/house-cleaning-hawthorn">Hawthorn</a></li>
          </ul>
        </div>

        <!-- Copyright -->
        <div class="cs_footer_bottom_v1">
          &copy; 2024 Maid at Home. All rights reserved.
        </div>
      </div>
    </footer>
  </div>

</body>
</html>
