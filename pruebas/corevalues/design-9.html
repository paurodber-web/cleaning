<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Core Values - Image Reveal Banner</title>
  <link href="../../assets/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../assets/css/fontawesome.min.css" rel="stylesheet" />
  <link href="../../assets/css/style.css" rel="stylesheet" />
  <style>
      .cs_benefit_section { padding: 80px 0; }
      
      .reveal_card {
          position: relative;
          border-radius: 24px;
          overflow: hidden;
          background: #fff;
          min-height: 450px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      }

      .reveal_bg_img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          z-index: 0;
          transition: transform 1s ease;
      }
      .reveal_card:hover .reveal_bg_img {
          transform: scale(1.05);
      }

      /* Dark gradient overlay so text is readable */
      .reveal_overlay {
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%);
          z-index: 1;
      }

      .reveal_content {
          position: relative;
          z-index: 2;
          padding: 60px;
          height: 100%;
          display: flex;
          flex-direction: column;
          justify-content: center;
          max-width: 600px;
      }

      @media (max-width: 767px) {
          .reveal_overlay { background: rgba(0,0,0,0.8); }
          .reveal_content { padding: 40px 20px; }
      }

      .reveal_title {
          font-size: 36px;
          font-weight: 800;
          color: #fff;
          margin-bottom: 24px;
          display: flex;
          align-items: center;
          gap: 16px;
      }
      
      .reveal_title i {
          color: #00d2ff;
          font-size: 30px;
      }

      .reveal_desc {
          font-size: 18px;
          color: rgba(255,255,255,0.9);
          line-height: 1.8;
          margin-bottom: 0;
          border-left: 3px solid #00d2ff;
          padding-left: 20px;
      }
  </style>
</head>
<body class="cs_primary_font">
  <div class="cs_custom_content_wrapper">
    <div class="container p-0">
      
      <section class="cs_benefit_section cs_blue_bg3 cs_radius_16 mt-5">
        <div class="container px-4">
          <div class="cs_section_heading_style_1 cs_center_column text-center mb-5">
            <p class="cs_section_subtitle cs_white_bg cs_mb_16">Our core values</p>
            <h2 class="cs_section_title cs_fs_36 mb-0">Quality standards you can count on</h2>
          </div>

          <div class="reveal_card">
            <img src="../../assets/img/benefit-img1.jpg" alt="Our Foundation" class="reveal_bg_img">
            <div class="reveal_overlay"></div>
            
            <div class="reveal_content">
              <h3 class="reveal_title"><i class="fa-solid fa-star"></i> Our foundation</h3>
              <p class="reveal_desc">
                Built on trust and professional experience, we value reliability above all else. We make sure that every corner is covered and every expectation is met with a high level of expertise.
              </p>
            </div>
          </div>

        </div>
      </section>

    </div>
  </div>
</body>
</html>
