<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Core Values - Minimalist Focus Card</title>
  <link href="../../assets/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../assets/css/fontawesome.min.css" rel="stylesheet" />
  <link href="../../assets/css/style.css" rel="stylesheet" />
  <style>
      .cs_benefit_section { padding: 80px 0; }
      
      .focus_card {
          background: #fff;
          border-radius: 24px;
          padding: 12px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.03);
          max-width: 1000px;
          margin: 0 auto;
      }
      
      .focus_inner {
          border: 1px dashed #cbd5e1;
          border-radius: 16px;
          padding: 60px;
          display: flex;
          align-items: center;
          gap: 50px;
          transition: border-color 0.4s ease;
      }
      .focus_card:hover .focus_inner {
          border-color: #0056b3;
      }

      @media (max-width: 991px) {
          .focus_inner { flex-direction: column; padding: 40px 20px; text-align: center; }
      }

      .focus_icon_wrap {
          width: 120px;
          height: 120px;
          background: #f8fafd;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
          font-size: 48px;
          color: #0056b3;
          box-shadow: 0 10px 30px rgba(0,86,179,0.05);
          transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .focus_card:hover .focus_icon_wrap {
          transform: scale(1.1) rotate(5deg);
          background: #0056b3;
          color: #fff;
      }

      .focus_content h3 {
          font-size: 28px;
          font-weight: 800;
          color: #111;
          margin-bottom: 20px;
      }

      .focus_content p {
          font-size: 18px;
          color: #64748b;
          line-height: 1.8;
          margin-bottom: 0;
      }
  </style>
</head>
<body class="cs_primary_font">
  <div class="cs_custom_content_wrapper">
    <div class="container p-0">
      
      <section class="cs_benefit_section cs_blue_bg3 cs_radius_16 mt-5">
        <div class="container px-4">
          <div class="cs_section_heading_style_1 cs_center_column text-center mb-5">
            <p class="cs_section_subtitle cs_white_bg cs_mb_16">Our core values</p>
            <h2 class="cs_section_title cs_fs_36 mb-0">Quality standards you can count on</h2>
          </div>

          <div class="focus_card">
            <div class="focus_inner">
              
              <div class="focus_icon_wrap">
                <i class="fa-solid fa-gem"></i>
              </div>

              <div class="focus_content">
                <h3>Our foundation</h3>
                <p>Built on trust and professional experience, we value reliability above all else. We make sure that every corner is covered and every expectation is met with a high level of expertise.</p>
              </div>

            </div>
          </div>

        </div>
      </section>

    </div>
  </div>
</body>
</html>
