<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Core Values - Overlapping Typographic Bento</title>
  <link href="../../assets/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../assets/css/fontawesome.min.css" rel="stylesheet" />
  <link href="../../assets/css/style.css" rel="stylesheet" />
  <style>
      .cs_benefit_section { padding: 80px 0; }
      
      .bento_wrap {
          display: flex;
          align-items: center;
          gap: 30px;
          background: #fff;
          border-radius: 24px;
          padding: 20px;
          box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      }
      
      @media (max-width: 991px) {
          .bento_wrap { flex-direction: column; padding: 30px; }
      }

      .bento_img_box {
          flex: 1;
          height: 100%;
          min-height: 450px;
          border-radius: 16px;
          overflow: hidden;
          position: relative;
      }
      .bento_img_box img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          position: absolute;
          inset: 0;
          transition: transform 0.8s ease;
      }
      .bento_wrap:hover .bento_img_box img {
          transform: scale(1.05);
      }
      
      /* Subtle blue overlay on image */
      .bento_img_box::after {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(135deg, rgba(0,86,179,0.2) 0%, rgba(0,0,0,0) 100%);
      }

      .bento_content_box {
          flex: 1.2;
          padding: 40px 30px;
          position: relative;
      }
      
      /* Large decorative quote mark */
      .bento_content_box::before {
          content: '"';
          position: absolute;
          top: -20px;
          left: 10px;
          font-size: 150px;
          color: #f0f6ff;
          font-family: serif;
          line-height: 1;
          z-index: 0;
      }

      .bento_inner {
          position: relative;
          z-index: 1;
      }

      .bento_title {
          font-size: 32px;
          font-weight: 800;
          color: #111;
          margin-bottom: 24px;
          line-height: 1.3;
      }
      
      .bento_title span {
          color: #0056b3;
      }

      .bento_desc {
          font-size: 18px;
          color: #555;
          line-height: 1.8;
          margin-bottom: 0;
      }
  </style>
</head>
<body class="cs_primary_font">
  <div class="cs_custom_content_wrapper">
    <div class="container p-0">
      
      <section class="cs_benefit_section cs_blue_bg3 cs_radius_16 mt-5">
        <div class="container px-4">
          <div class="cs_section_heading_style_1 cs_center_column text-center mb-5">
            <p class="cs_section_subtitle cs_white_bg cs_mb_16">Our core values</p>
            <h2 class="cs_section_title cs_fs_36 mb-0">Quality standards you can count on</h2>
          </div>

          <div class="bento_wrap">
            <div class="bento_img_box">
              <img src="../../assets/img/benefit-img1.jpg" alt="Our Foundation">
            </div>
            
            <div class="bento_content_box">
              <div class="bento_inner">
                <h3 class="bento_title">Our <span>foundation</span></h3>
                <p class="bento_desc">
                  Built on trust and professional experience, we value reliability above all else. We make sure that every corner is covered and every expectation is met with a high level of expertise.
                </p>
              </div>
            </div>
          </div>

        </div>
      </section>

    </div>
  </div>
</body>
</html>
