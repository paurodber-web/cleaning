<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Extra Services - Mini Chips Grid</title>
  <link href="../../assets/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../assets/css/fontawesome.min.css" rel="stylesheet" />
  <link href="../../assets/css/style.css" rel="stylesheet" />
  <style>
      .cs_extra_services_section { background-color: #f9fbff; padding: 60px 0; }
      
      .cs_extra_chip {
          background: #fff;
          border: 1px solid #eef2f6;
          border-radius: 12px;
          padding: 12px 16px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          transition: all 0.3s ease;
          height: 100%;
          box-shadow: 0 2px 5px rgba(0,0,0,0.01);
      }
      .cs_extra_chip:hover {
          border-color: #0056b3;
          box-shadow: 0 4px 12px rgba(0,86,179,0.06);
          transform: translateY(-2px);
      }

      .cs_extra_chip_left {
          display: flex;
          align-items: center;
          gap: 12px;
          overflow: hidden;
      }
      
      .cs_extra_chip_icon {
          color: #0056b3;
          font-size: 16px;
      }

      .cs_extra_chip_title {
          font-size: 14px;
          font-weight: 700;
          color: #111;
          margin: 0;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
      }

      .cs_extra_chip_price {
          font-size: 15px;
          font-weight: 800;
          color: #0056b3;
          background: #f0f6ff;
          padding: 4px 10px;
          border-radius: 8px;
          margin-left: 8px;
      }
  </style>
</head>
<body class="cs_primary_font">
  <div class="cs_custom_content_wrapper">
    <section class="cs_extra_services_section">
      <div class="container">
        <div class="cs_section_heading_style_1 cs_center_column text-center mb-4">
          <p class="cs_section_subtitle cs_blue_bg3 cs_mb_8">Add-ons</p>
          <h2 class="cs_section_title cs_fs_36 cs_black_color mb-0">Extra Services</h2>
        </div>

        <div class="row g-3 justify-content-center">
            
          <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="cs_extra_chip" title="Degreasing and scrubbing of interior & racks.">
              <div class="cs_extra_chip_left">
                <i class="fa-solid fa-temperature-arrow-up cs_extra_chip_icon"></i>
                <h3 class="cs_extra_chip_title">Inside Oven</h3>
              </div>
              <div class="cs_extra_chip_price">+$35</div>
            </div>
          </div>

          <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="cs_extra_chip" title="Wiping down all shelves, drawers & walls.">
              <div class="cs_extra_chip_left">
                <i class="fa-solid fa-snowflake cs_extra_chip_icon"></i>
                <h3 class="cs_extra_chip_title">Inside Fridge</h3>
              </div>
              <div class="cs_extra_chip_price">+$35</div>
            </div>
          </div>

          <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="cs_extra_chip" title="Spotless cleaning of glass, frames & sills.">
              <div class="cs_extra_chip_left">
                <i class="fa-solid fa-window-maximize cs_extra_chip_icon"></i>
                <h3 class="cs_extra_chip_title">Interior Windows</h3>
              </div>
              <div class="cs_extra_chip_price">+$40</div>
            </div>
          </div>

          <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="cs_extra_chip" title="Detailed wiping of empty interior spaces.">
              <div class="cs_extra_chip_left">
                <i class="fa-solid fa-box-archive cs_extra_chip_icon"></i>
                <h3 class="cs_extra_chip_title">Inside Cabinets</h3>
              </div>
              <div class="cs_extra_chip_price">+$25</div>
            </div>
          </div>
          
          <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="cs_extra_chip">
              <div class="cs_extra_chip_left">
                <i class="fa-solid fa-shirt cs_extra_chip_icon"></i>
                <h3 class="cs_extra_chip_title">Laundry Wash</h3>
              </div>
              <div class="cs_extra_chip_price">+$20</div>
            </div>
          </div>
          
          <div class="col-xl-3 col-lg-4 col-md-6">
            <div class="cs_extra_chip">
              <div class="cs_extra_chip_left">
                <i class="fa-solid fa-paw cs_extra_chip_icon"></i>
                <h3 class="cs_extra_chip_title">Pet Hair</h3>
              </div>
              <div class="cs_extra_chip_price">+$30</div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </div>
</body>
</html>
