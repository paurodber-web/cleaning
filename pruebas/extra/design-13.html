<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Extra Services - Compact Horizontal</title>
  <link href="../../assets/css/bootstrap.min.css" rel="stylesheet" />
  <link href="../../assets/css/fontawesome.min.css" rel="stylesheet" />
  <link href="../../assets/css/style.css" rel="stylesheet" />
  <style>
      .cs_extra_services_section { background-color: #f9fbff; padding: 60px 0; }
      
      .cs_extra_compact_card {
          background: #fff;
          border: 1px solid #eef2f6;
          border-radius: 16px;
          padding: 16px;
          display: flex;
          align-items: center;
          transition: all 0.3s ease;
          box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      }
      .cs_extra_compact_card:hover {
          border-color: #cce0ff;
          box-shadow: 0 8px 20px rgba(0,86,179,0.05);
          transform: translateY(-2px);
      }

      .cs_extra_compact_icon {
          width: 44px;
          height: 44px;
          background: #f0f6ff;
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 18px;
          color: #0056b3;
          flex-shrink: 0;
          margin-right: 16px;
      }

      .cs_extra_compact_info {
          flex-grow: 1;
          padding-right: 16px;
      }
      .cs_extra_compact_title {
          font-size: 16px;
          font-weight: 700;
          color: #111;
          margin-bottom: 2px;
      }
      .cs_extra_compact_desc {
          font-size: 13px;
          color: #666;
          margin-bottom: 0;
          line-height: 1.4;
      }

      .cs_extra_compact_price {
          font-size: 18px;
          font-weight: 800;
          color: #0056b3;
          flex-shrink: 0;
          text-align: right;
      }
  </style>
</head>
<body class="cs_primary_font">
  <div class="cs_custom_content_wrapper">
    <section class="cs_extra_services_section">
      <div class="container">
        <div class="cs_section_heading_style_1 cs_center_column text-center mb-4">
          <p class="cs_section_subtitle cs_blue_bg3 cs_mb_8">Add-ons</p>
          <h2 class="cs_section_title cs_fs_36 cs_black_color mb-0">Extra Services</h2>
        </div>

        <div class="row cs_gap_y_24">
            
          <div class="col-lg-6">
            <div class="cs_extra_compact_card">
              <div class="cs_extra_compact_icon"><i class="fa-solid fa-temperature-arrow-up"></i></div>
              <div class="cs_extra_compact_info">
                <h3 class="cs_extra_compact_title">Inside Oven</h3>
                <p class="cs_extra_compact_desc">Degreasing and scrubbing of interior & racks.</p>
              </div>
              <div class="cs_extra_compact_price">+$35</div>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="cs_extra_compact_card">
              <div class="cs_extra_compact_icon"><i class="fa-solid fa-snowflake"></i></div>
              <div class="cs_extra_compact_info">
                <h3 class="cs_extra_compact_title">Inside Fridge</h3>
                <p class="cs_extra_compact_desc">Wiping down all shelves, drawers & walls.</p>
              </div>
              <div class="cs_extra_compact_price">+$35</div>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="cs_extra_compact_card">
              <div class="cs_extra_compact_icon"><i class="fa-solid fa-window-maximize"></i></div>
              <div class="cs_extra_compact_info">
                <h3 class="cs_extra_compact_title">Interior Windows</h3>
                <p class="cs_extra_compact_desc">Spotless cleaning of glass, frames & sills.</p>
              </div>
              <div class="cs_extra_compact_price">+$40</div>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="cs_extra_compact_card">
              <div class="cs_extra_compact_icon"><i class="fa-solid fa-box-archive"></i></div>
              <div class="cs_extra_compact_info">
                <h3 class="cs_extra_compact_title">Inside Cabinets</h3>
                <p class="cs_extra_compact_desc">Detailed wiping of empty interior spaces.</p>
              </div>
              <div class="cs_extra_compact_price">+$25</div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </div>
</body>
</html>
